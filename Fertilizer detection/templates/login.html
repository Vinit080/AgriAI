{% extends 'base.html' %}
{% block title %}Login - AgriAI{% endblock %}
{% block content %}
<div class="content" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="card" style="width: 100%; max-width: 400px; padding: 40px;">
        <h2 style="text-align: center; margin-bottom: 20px;">Welcome Back</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div style="color: #e11d48; margin-bottom: 15px; text-align: center;">
                    {% for message in messages %}{{ message }}{% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 25px;">Login</button>
        </form>
        <p style="text-align: center; margin-top: 20px; color: var(--text-muted);">
            Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary);">Register</a>
        </p>
    </div>
</div>
{% endblock %}
